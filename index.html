<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6f4dff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Capital Portfolio</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Capital Market Tracker</p>
          <h1>Portfolio</h1>
        </div>
        <button id="installBtn" class="ghost-btn" hidden>Install</button>
      </header>

      <main>
        <section id="screen-home" class="screen active">
          <article class="hero-card">
            <p class="eyebrow">Latest Total</p>
            <h2 id="latestTotal">-</h2>
            <p id="latestDate" class="subtle"></p>
          </article>

          <section>
            <h3>Institutions</h3>
            <div class="cards-grid" id="institutionCards"></div>
          </section>

          <section>
            <h3>Latest Allocation</h3>
            <div class="chart-card"><canvas id="allocationChart"></canvas></div>
          </section>

          <section>
            <div class="section-head">
              <h3>Recent Entries</h3>
              <button id="homeExportBtn" class="ghost-btn">Export XLSX</button>
            </div>
            <div id="recentEntries" class="list"></div>
          </section>

          <section>
            <h3>Total Trend</h3>
            <div class="chart-card"><canvas id="homeTrendChart"></canvas></div>
          </section>
        </section>

        <section id="screen-history" class="screen">
          <div class="section-head">
            <h3>All Entries</h3>
            <button id="historyExportBtn" class="ghost-btn">Export XLSX</button>
          </div>
          <div id="historyList" class="list"></div>
        </section>

        <section id="screen-add" class="screen">
          <h3 id="formTitle">Add Entry</h3>
          <form id="entryForm" class="card form-card">
            <label>Date <input type="date" id="inputDate" required /></label>
            <label>Migdal <input type="number" id="inputMigdal" min="0" step="1" required /></label>
            <label>Fenix <input type="number" id="inputFenix" min="0" step="1" required /></label>
            <label>Mor <input type="number" id="inputMor" min="0" step="1" required /></label>
            <label>Total <input type="number" id="inputTotal" min="0" step="1" required /></label>
            <p id="autoTotalHint" class="subtle"></p>
            <div class="form-actions">
              <button type="submit" class="primary-btn">Save Entry</button>
              <button type="button" id="cancelEditBtn" class="ghost-btn" hidden>Cancel Edit</button>
            </div>
          </form>
        </section>

        <section id="screen-settings" class="screen">
          <div class="card settings-card">
            <h3>Preferences</h3>
            <label class="toggle-row">
              <span>Auto-calculate Total</span>
              <input type="checkbox" id="autoCalcToggle" />
            </label>
            <label class="settings-field">
              <span>Currency Style</span>
              <select id="currencyStyle">
                <option value="number">Number</option>
                <option value="currency">ILS Currency</option>
              </select>
            </label>
          </div>

          <div class="card settings-card">
            <h3>Data</h3>
            <div class="settings-stats">
              <div class="row"><span>Saved entries</span><strong id="settingsEntryCount">0</strong></div>
              <div class="row"><span>Latest entry</span><strong id="settingsLatestDate">-</strong></div>
            </div>
            <button id="settingsExportBtn" class="ghost-btn">Export XLSX</button>
            <button id="resetDataBtn" class="danger-btn">Reset to Initial Data</button>
          </div>
        </section>
      </main>

      <nav class="bottom-nav">
        <button class="nav-btn active" data-screen="home" aria-label="Home">
          <span class="nav-icon">⌂</span>
          <span class="nav-label">Home</span>
        </button>
        <button class="nav-btn" data-screen="history" aria-label="History">
          <span class="nav-icon">◷</span>
          <span class="nav-label">History</span>
        </button>
        <button class="nav-btn nav-add" data-screen="add" aria-label="Add">
          <span class="nav-icon">＋</span>
          <span class="nav-label">Add</span>
        </button>
        <button class="nav-btn" data-screen="settings" aria-label="Settings">
          <span class="nav-icon">⚙</span>
          <span class="nav-label">Settings</span>
        </button>
      </nav>
    </div>

    <dialog id="detailDialog" class="detail-dialog">
      <article class="card">
        <div class="section-head">
          <h3>Entry Detail</h3>
          <button id="closeDetailBtn" class="ghost-btn">Close</button>
        </div>
        <div id="detailBody"></div>
      </article>
    </dialog>
  </body>
</html>
